name: Watchlist Re-analysis

on:
  schedule:
    - cron: "0 6 * * 1"  # Every Monday at 06:00 UTC
  workflow_dispatch:

jobs:
  re-analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[api]"

      - name: Re-analyze watchlist
        env:
          CFD_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          CFD_SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: cfd watchlist reanalyze --all
